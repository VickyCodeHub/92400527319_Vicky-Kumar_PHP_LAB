<!DOCTYPE html>
<html>
<head>
<title>Login & Register</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200")
no-repeat center center/cover;
}

.container{
width:380px;
padding:30px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.4);
color:white;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
outline:none;
border-bottom:2px solid white;
background:transparent;
color:white;
}

input::placeholder{
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0b2341;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#123b68;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#fff;
cursor:pointer;
font-weight:bold;
}

.hidden{
display:none;
}

#welcome{
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- Register Form -->
<div id="registerForm">
<h2>Registration</h2>

<input type="text" id="regUser" placeholder="Username">

<input type="email" id="regEmail" placeholder="Email">

<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Register</button>

<p>
Already have account?
<a onclick="showLogin()">Login</a>
</p>
</div>

<!-- Login Form -->
<div id="loginForm" class="hidden">
<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

<p>
<a onclick="forgotPassword()">Forgot Password?</a>
</p>

<p>
Don't have account?
<a onclick="showRegister()">Register</a>
</p>
</div>

<!-- Welcome -->
<div id="welcome" class="hidden">
<h2>Welcome</h2>

<h3 id="userName"></h3>

<button onclick="logout()">Logout</button>
</div>

</div>

<script>

function showLogin(){
document.getElementById("registerForm").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
}

function showRegister(){
document.getElementById("loginForm").classList.add("hidden");
document.getElementById("registerForm").classList.remove("hidden");
}

function register(){

let username=document.getElementById("regUser").value;
let email=document.getElementById("regEmail").value;
let password=document.getElementById("regPass").value;

if(username=="" || email=="" || password==""){
alert("Fill all fields");
return;
}

localStorage.setItem("username",username);
localStorage.setItem("email",email);
localStorage.setItem("password",password);

alert("Registration Successful");

showLogin();
}

function login(){

let email=document.getElementById("loginEmail").value;
let password=document.getElementById("loginPass").value;

let savedEmail=localStorage.getItem("email");
let savedPass=localStorage.getItem("password");
let username=localStorage.getItem("username");

if(email===savedEmail && password===savedPass){

document.getElementById("loginForm").classList.add("hidden");

document.getElementById("welcome").classList.remove("hidden");

document.getElementById("userName").innerText=username;

}else{
alert("Wrong Email or Password");
}
}

function logout(){
document.getElementById("welcome").classList.add("hidden");
document.getElementById("loginForm").classList.remove("hidden");
}

function forgotPassword(){

let email=prompt("Enter Registered Email");

let savedEmail=localStorage.getItem("email");

if(email===savedEmail){
alert("Your Password is: " + localStorage.getItem("password"));
}else{
alert("Email Not Found");
}
}

</script>

</body>
</html>
